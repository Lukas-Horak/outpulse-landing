<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f2f1ee; --green: #7cc5a2; --blue: #7BAFD4; --dark: #1a1a1a;
    --grey: #9B9590; --greyLight: #d5d2ce; --font: 'DM Sans', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--dark); overflow: hidden; height: 100vh; display: grid; grid-template-columns: 190px 1fr; }

  /* Email queue panel */
  .queue { background: #fff; border-right: 1px solid rgba(0,0,0,0.06); padding: 14px 0; overflow-y: auto; }
  .queue::-webkit-scrollbar { width: 3px; }
  .queue::-webkit-scrollbar-thumb { background: var(--greyLight); border-radius: 3px; }
  .q-header { padding: 0 12px 10px; font-size: 12px; font-weight: 600; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
  .q-count { font-size: 10px; color: var(--grey); background: var(--bg); padding: 2px 7px; border-radius: 8px; font-weight: 600; }
  .q-item {
    padding: 9px 12px; border-bottom: 1px solid rgba(0,0,0,0.03); cursor: pointer;
    opacity: 0; transform: translateX(-10px);
    transition: opacity 0.35s, transform 0.35s, background 0.15s, border-color 0.15s;
    border-left: 3px solid transparent;
  }
  .q-item.show { opacity: 1; transform: translateX(0); }
  .q-item:hover { background: rgba(124,197,162,0.05); }
  .q-item.active { background: rgba(124,197,162,0.08); border-left-color: var(--green); }
  .q-name { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
  .q-subj { font-size: 10px; color: var(--grey); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-tag { display: inline-block; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 3px; }
  .q-tag.done { background: #e8f5ee; color: #3a9a5c; }
  .q-tag.gen { background: #fff3e0; color: #d4915c; }

  /* Composer */
  .composer { padding: 16px 20px; overflow-y: auto; }
  .composer::-webkit-scrollbar { width: 3px; }
  .composer::-webkit-scrollbar-thumb { background: var(--greyLight); border-radius: 3px; }
  .ai-pill {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
    background: linear-gradient(135deg, var(--green), var(--blue)); color: #fff;
    border-radius: 12px; font-size: 9px; font-weight: 700; margin-bottom: 10px;
  }
  .ai-pill svg { width: 10px; height: 10px; }
  .c-to { font-size: 11px; color: var(--grey); margin-bottom: 2px; }
  .c-to strong { color: var(--dark); }
  .c-subject { font-size: 15px; font-weight: 600; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.06); min-height: 20px; transition: opacity 0.3s; }
  .c-body { font-size: 12px; line-height: 1.75; color: #444; transition: opacity 0.3s; }
  .c-body p { margin-bottom: 8px; }
  .c-body .hl { color: var(--green); font-weight: 600; }
  .word { opacity: 0; display: inline; transition: opacity 0.2s; }
  .word.show { opacity: 1; }

  /* Metrics */
  .metrics {
    display: flex; gap: 8px; margin-top: 14px; padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.06);
    opacity: 0; transition: opacity 0.4s;
  }
  .metrics.show { opacity: 1; }
  .m-pill {
    display: flex; align-items: center; gap: 4px; padding: 5px 8px;
    background: #fff; border: 1px solid rgba(0,0,0,0.05); border-radius: 6px;
    font-size: 9px; font-weight: 600;
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; }
  .dot.g { background: var(--green); }
  .dot.b { background: var(--blue); }

  /* Send button */
  .send-row { display: flex; gap: 8px; margin-top: 12px; }
  .send-btn {
    padding: 7px 16px; border-radius: 8px; background: var(--green); color: #fff;
    font-size: 11px; font-weight: 600; border: none; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .send-btn:hover { transform: scale(1.03); box-shadow: 0 2px 10px rgba(124,197,162,0.3); }
  .send-btn:active { transform: scale(0.97); }
  .edit-btn {
    padding: 7px 14px; border-radius: 8px; background: #fff; color: var(--dark);
    font-size: 11px; font-weight: 600; border: 1px solid rgba(0,0,0,0.08); cursor: pointer;
    transition: background 0.15s;
  }
  .edit-btn:hover { background: var(--bg); }
</style>
</head>
<body>

<div class="queue">
  <div class="q-header">Emails <span class="q-count" id="qc">0/7</span></div>
  <div id="qList"></div>
</div>

<div class="composer" id="composer">
  <div class="ai-pill">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    AI-Personalized
  </div>
  <div class="c-to">To: <strong id="cTo">Michael Torres</strong> — <span id="cRole">VP of Sales, Velociti</span></div>
  <div class="c-subject" id="cSubj"></div>
  <div class="c-body" id="cBody"></div>
  <div class="metrics" id="met">
    <div class="m-pill"><span class="dot g"></span> 94% deliverability</div>
    <div class="m-pill"><span class="dot b"></span> Personalization: High</div>
    <div class="m-pill"><span class="dot g"></span> Spam: Very low</div>
  </div>
  <div class="send-row" id="sendRow" style="opacity:0; transition: opacity 0.4s;">
    <button class="send-btn" id="sendBtn">Send email</button>
    <button class="edit-btn" id="editBtn">Edit draft</button>
  </div>
</div>

<script>
const emails = [
  {
    to: 'Michael Torres', role: 'VP of Sales, Velociti',
    subj: "Quick thought on Velociti's expansion",
    body: [
      'Hi Michael,',
      'I noticed Velociti just opened a new office in Austin — congrats. Growing sales across regions is exciting but comes with real scaling challenges.',
      'We built <span class="hl">Outpulse</span> for teams like yours — it finds ideal prospects, writes personal emails, and books meetings directly in your calendar.',
      'One client went from <span class="hl">5 to 40+ meetings/month</span> in three weeks. Quick 15-min call Thursday?',
      'Best, Lukas'
    ],
    tag: 'done', deliverability: '94%', personalization: 'High', spam: 'Very low'
  },
  {
    to: 'Anna Lindberg', role: 'Head of Growth, Nordicly',
    subj: "Scaling Nordicly's outbound — an idea",
    body: [
      'Hi Anna,',
      'Saw Nordicly\'s impressive growth in the Nordics — expanding to the US market next must be exciting (and daunting).',
      '<span class="hl">Outpulse</span> helps growth teams like yours run outbound at scale without hiring SDRs. AI finds the right prospects and writes emails that actually get replies.',
      'We helped a similar-stage company book <span class="hl">38 demos in their first month</span>. Would love to show you how — 15 min this week?',
      'Cheers, Lukas'
    ],
    tag: 'done', deliverability: '96%', personalization: 'Very high', spam: 'None'
  },
  {
    to: 'James Whitfield', role: 'CRO, Stackline',
    subj: 'Stackline + AI outreach = faster pipeline',
    body: [
      'Hey James,',
      'As CRO at Stackline, you know how hard it is to keep the top of funnel full while maintaining quality conversations.',
      'Our AI agent handles the entire outbound flow — from <span class="hl">prospecting to personalized emails to booking</span>. It runs 24/7 and never misses a follow-up.',
      'Happy to share how teams like yours are <span class="hl">tripling pipeline velocity</span> with Outpulse. Free Thursday afternoon?',
      'Best, Lukas'
    ],
    tag: 'done', deliverability: '92%', personalization: 'High', spam: 'Low'
  },
  {
    to: 'Sarah Kim', role: 'Dir. of Sales, CloudMetrics',
    subj: 'Re: CloudMetrics Q1 targets',
    body: [
      'Hi Sarah,',
      'Noticed CloudMetrics is hiring 3 new SDRs — that tells me Q1 targets are ambitious. What if you could hit those numbers <span class="hl">without the hiring cycle</span>?',
      'Outpulse acts as your AI SDR team: finds verified prospects, crafts personalized outreach, handles follow-ups, and books meetings automatically.',
      'One founder told me: "It\'s like having <span class="hl">10 SDRs who never sleep</span>." Worth a quick look?',
      'Lukas'
    ],
    tag: 'gen', deliverability: '91%', personalization: 'High', spam: 'Very low'
  },
  {
    to: 'David Okafor', role: 'VP Biz Dev, AfriTech',
    subj: 'Congrats on the Series B, David',
    body: [
      'David, congrats on the Series B — huge milestone for AfriTech!',
      'Post-raise, scaling outbound fast is usually the priority. <span class="hl">Outpulse</span> can help you spin up personalized outreach to hundreds of prospects daily — no SDR team needed.',
      'We\'re seeing African-focused SaaS companies <span class="hl">book 2-3x more meetings</span> when they switch from manual outbound to AI.',
      'Would love to connect — how\'s next week?',
      'Best, Lukas'
    ],
    tag: 'gen', deliverability: '89%', personalization: 'Very high', spam: 'None'
  },
  {
    to: 'Elena Rousseau', role: 'Head of Sales, Lumière',
    subj: "Lumière's TAM expansion — thoughts?",
    body: [
      'Hi Elena,',
      'I saw Lumière is expanding into enterprise — that\'s a big TAM jump. The challenge is always reaching the right decision-makers at scale.',
      '<span class="hl">Outpulse</span> was built for exactly this: find verified enterprise prospects, write emails that reference their specific context, and book meetings on autopilot.',
      'We helped a similar AI company go from <span class="hl">seed-stage outbound to 50+ enterprise demos/month</span>. Interested in seeing how?',
      'Elena, Lukas'
    ],
    tag: 'gen', deliverability: '95%', personalization: 'High', spam: 'Very low'
  },
  {
    to: 'Ryan Park', role: 'Sales Dir., Pivot Labs',
    subj: '3x pipeline in 30 days?',
    body: [
      'Hi Ryan,',
      'Bold subject line, but the data backs it up. Teams switching from manual SDR outreach to <span class="hl">Outpulse</span> consistently see 2-4x pipeline growth in the first month.',
      'The secret: AI-powered personalization at scale. Every email references the prospect\'s company, role, and recent news — <span class="hl">no templates, ever</span>.',
      'Would a 15-min demo be worth your time? I can show you exactly how it works for Pivot Labs\' ICP.',
      'Ryan, Lukas'
    ],
    tag: 'gen', deliverability: '93%', personalization: 'High', spam: 'Low'
  }
];

let activeEmailIdx = 0;
let initialAnimDone = false;

const qList = document.getElementById('qList');
const qc = document.getElementById('qc');
const cTo = document.getElementById('cTo');
const cRole = document.getElementById('cRole');
const cSubj = document.getElementById('cSubj');
const cBody = document.getElementById('cBody');
const met = document.getElementById('met');
const sendRow = document.getElementById('sendRow');
const sendBtn = document.getElementById('sendBtn');
const editBtn = document.getElementById('editBtn');

// Create all queue items
const qItems = [];
function addQueueItems() {
  emails.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = 'q-item' + (i === 0 ? ' active' : '');
    item.innerHTML = `<div class="q-name">${e.to}</div><div class="q-subj">${e.subj}</div><div class="q-tag ${e.tag}">${e.tag==='done'?'✓ Ready':'⟳ Writing…'}</div>`;
    qList.appendChild(item);
    qItems.push(item);

    // Click to switch email
    item.addEventListener('click', () => {
      if (!initialAnimDone) return;
      switchToEmail(i);
    });

    // Staggered reveal
    setTimeout(() => {
      item.classList.add('show');
      qc.textContent = (i+1) + '/' + emails.length;
    }, i * 200 + 400);
  });

  // Start initial email typing after queue loads
  setTimeout(() => typeEmailContent(0, () => {
    initialAnimDone = true;
    sendRow.style.opacity = '1';
  }), emails.length * 200 + 800);
}

// Type email content with word-by-word animation
function typeEmailContent(idx, onDone) {
  const e = emails[idx];
  cTo.textContent = e.to;
  cRole.textContent = e.role;
  cSubj.textContent = '';
  cBody.innerHTML = '';
  met.classList.remove('show');

  // Type subject
  let si = 0;
  function typeSubj() {
    if (si <= e.subj.length) {
      cSubj.textContent = e.subj.slice(0, si);
      si++;
      setTimeout(typeSubj, 25);
    } else typeParagraphs();
  }

  // Type body paragraphs word-by-word
  let pi = 0;
  function typeParagraphs() {
    if (pi >= e.body.length) {
      // Update metrics
      met.querySelectorAll('.m-pill')[0].innerHTML = `<span class="dot g"></span> ${e.deliverability} deliverability`;
      met.querySelectorAll('.m-pill')[1].innerHTML = `<span class="dot b"></span> Personalization: ${e.personalization}`;
      met.querySelectorAll('.m-pill')[2].innerHTML = `<span class="dot g"></span> Spam: ${e.spam}`;
      met.classList.add('show');
      if (onDone) onDone();
      return;
    }
    const text = e.body[pi];
    const p = document.createElement('p');
    const parts = text.split(/(<span class="hl">.*?<\/span>)/g);
    const words = [];
    parts.forEach(part => {
      if (part.startsWith('<span')) words.push(part);
      else part.split(/(\s+)/).forEach(w => { if(w) words.push(w); });
    });
    words.forEach(w => {
      const s = document.createElement('span');
      s.className = 'word';
      if (w.startsWith('<span')) s.innerHTML = w; else s.textContent = w;
      p.appendChild(s);
    });
    cBody.appendChild(p);
    let wi = 0;
    function revealWord() {
      const spans = p.querySelectorAll('.word');
      if (wi < spans.length) { spans[wi].classList.add('show'); wi++; setTimeout(revealWord, 25); }
      else { pi++; setTimeout(typeParagraphs, 100); }
    }
    revealWord();
  }

  typeSubj();
}

// Switch to a different email (instant, no typing animation after first)
function switchToEmail(idx) {
  if (idx === activeEmailIdx) return;
  activeEmailIdx = idx;

  // Update queue active state
  qItems.forEach((item, i) => item.classList.toggle('active', i === idx));

  const e = emails[idx];
  cTo.textContent = e.to;
  cRole.textContent = e.role;

  // Fade out, switch, fade in
  cSubj.style.opacity = '0';
  cBody.style.opacity = '0';
  met.classList.remove('show');
  sendRow.style.opacity = '0';

  setTimeout(() => {
    cSubj.textContent = e.subj;
    cBody.innerHTML = e.body.map(p => `<p>${p}</p>`).join('');
    cSubj.style.opacity = '1';
    cBody.style.opacity = '1';

    met.querySelectorAll('.m-pill')[0].innerHTML = `<span class="dot g"></span> ${e.deliverability} deliverability`;
    met.querySelectorAll('.m-pill')[1].innerHTML = `<span class="dot b"></span> Personalization: ${e.personalization}`;
    met.querySelectorAll('.m-pill')[2].innerHTML = `<span class="dot g"></span> Spam: ${e.spam}`;
    setTimeout(() => { met.classList.add('show'); sendRow.style.opacity = '1'; }, 200);
  }, 250);
}

// Send / Edit button interactions
sendBtn.addEventListener('click', () => {
  const orig = sendBtn.textContent;
  sendBtn.textContent = '✓ Sent!';
  sendBtn.style.background = 'var(--dark)';
  // Mark queue item as sent
  const tag = qItems[activeEmailIdx].querySelector('.q-tag');
  tag.className = 'q-tag done';
  tag.textContent = '✓ Sent';
  setTimeout(() => { sendBtn.textContent = orig; sendBtn.style.background = ''; }, 2000);
});

editBtn.addEventListener('click', () => {
  const orig = editBtn.textContent;
  editBtn.textContent = '✏️ Editing…';
  setTimeout(() => { editBtn.textContent = orig; }, 1500);
});

// Start
addQueueItems();
</script>
</body>
</html>
