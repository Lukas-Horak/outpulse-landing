<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outpulse Logo — SVG</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a; color:#fff;
    font-family: system-ui, -apple-system, sans-serif;
    display:flex; flex-direction:column; align-items:center;
    gap:56px; padding:48px 24px; min-height:100vh;
  }
  h2 {
    font-size:11px; color:#444; text-transform:uppercase;
    letter-spacing:.15em; margin-bottom:4px;
  }
  .row {
    display:flex; align-items:center; gap:48px;
    flex-wrap:wrap; justify-content:center;
  }
  .sample {
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .sample span { font-size:10px; color:#333; }

  .on-light {
    background:#f5f3ef; border-radius:16px; padding:40px;
  }

  .wordmark {
    display:flex; align-items:center; gap:12px;
  }
  .wordmark-text {
    font-size:28px; font-weight:600; letter-spacing:-0.03em;
    font-family: 'Inter', system-ui, sans-serif;
  }

  .logo-wrap {
    cursor:pointer; display:inline-flex;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .logo-wrap:hover { transform: scale(1.05); }

  pre {
    background:#111; border:1px solid #1a1a1a; border-radius:8px;
    padding:16px; font-size:10px; color:#666; max-width:900px;
    overflow:auto; white-space:pre-wrap; max-height:300px; line-height:1.5;
  }

  .controls {
    display:flex; gap:16px; flex-wrap:wrap; justify-content:center;
  }
  .controls label {
    font-size:11px; color:#555; display:flex; flex-direction:column; gap:4px; align-items:center;
  }
  .controls input[type=range] { width:120px; }
  .controls .val { font-size:10px; color:#888; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>

<h2>Outpulse Logo — On dark</h2>
<div class="row" id="darkRow"></div>

<h2>On light</h2>
<div class="on-light">
  <div class="row" id="lightRow"></div>
</div>

<h2>With wordmark</h2>
<div class="row" style="gap:64px" id="wordRow"></div>

<h2>Tune parameters</h2>
<div class="controls" id="controls"></div>

<h2>Standalone SVG (white on transparent)</h2>
<pre id="svgCode"></pre>

<h2>Standalone SVG (black on transparent)</h2>
<pre id="svgCodeDark"></pre>

<script>
// ─── Outpulse Logo ───
// Two overlapping shapes: C (crescent, left) + O (ring, right)
// The O is visually "in front" of the C — achieved via SVG mask

// Tunable parameters (defaults match the reference image)
let P = {
  R:      90,    // outer radius (both shapes share this)
  cx1:    90,    // left C circle center x
  cx2:    176,   // right O circle center x
  cy:     100,   // vertical center (both)
  cutDx:  20,    // crescent cutout offset (from cx1, rightward)
  cutR:   72,    // crescent cutout radius
  oIR:    54,    // O inner (hole) radius
};

// ─── SVG Builder ───
function circ(cx, cy, r) {
  // Full circle as two half-arcs (CW). Works with fill-rule:evenodd to punch holes.
  return `M${cx},${cy - r}A${r},${r},0,1,1,${cx},${cy + r}A${r},${r},0,1,1,${cx},${cy - r}Z`;
}

let _n = 0;
function buildSVG(fill, width, forExport) {
  const { R, cx1, cx2, cy, cutDx, cutR, oIR } = P;
  const vw = cx2 + R;   // viewBox width (tight to right edge of O)
  const vh = cy + R + 10; // viewBox height (tight to bottom + small pad)
  const h = Math.round(width * vh / vw);

  const cutCx = cx1 + cutDx;

  // Left crescent = outer circle ⊖ cutout circle (evenodd)
  const crescentD = circ(cx1, cy, R) + ' ' + circ(cutCx, cy, cutR);

  // Right O ring = outer circle ⊖ inner circle (evenodd)
  const ringD = circ(cx2, cy, R) + ' ' + circ(cx2, cy, oIR);

  // Mask: hides left crescent behind right outer circle
  // Through the O's hole → you see background (crescent cutout is there)
  const mid = forExport ? 'opm' : ('m' + (++_n));

  return [
    `<svg width="${width}" height="${h}" viewBox="0 0 ${vw} ${vh}" fill="none" xmlns="http://www.w3.org/2000/svg">`,
    `  <defs>`,
    `    <mask id="${mid}">`,
    `      <rect width="${vw}" height="${vh}" fill="#fff"/>`,
    `      <circle cx="${cx2}" cy="${cy}" r="${R}" fill="#000"/>`,
    `    </mask>`,
    `  </defs>`,
    `  <path d="${crescentD}" fill="${fill}" fill-rule="evenodd" mask="url(#${mid})"/>`,
    `  <path d="${ringD}" fill="${fill}" fill-rule="evenodd"/>`,
    `</svg>`
  ].join('\n');
}

// ─── Render ───
function render() {
  _n = 0;
  const sizes = [200, 80, 32];

  // Dark bg (white logo)
  document.getElementById('darkRow').innerHTML = sizes.map(s =>
    `<div class="sample"><div class="logo-wrap">${buildSVG('#ffffff', s)}</div><span>${s}px</span></div>`
  ).join('');

  // Light bg (black logo)
  document.getElementById('lightRow').innerHTML = sizes.map(s =>
    `<div class="sample"><div class="logo-wrap">${buildSVG('#111114', s)}</div><span>${s}px</span></div>`
  ).join('');

  // Wordmark
  document.getElementById('wordRow').innerHTML = `
    <div class="wordmark">
      <div class="logo-wrap">${buildSVG('#ffffff', 38)}</div>
      <span class="wordmark-text" style="color:#fff">Outpulse</span>
    </div>
    <div class="wordmark on-light" style="padding:16px 28px">
      <div class="logo-wrap">${buildSVG('#111114', 38)}</div>
      <span class="wordmark-text" style="color:#111114">Outpulse</span>
    </div>
  `;

  // Exportable SVG code
  document.getElementById('svgCode').textContent = buildSVG('#ffffff', 200, true);
  document.getElementById('svgCodeDark').textContent = buildSVG('#000000', 200, true);
}

// ─── Controls ───
const paramDefs = [
  { key:'R',     label:'Outer R',      min:50, max:120, step:1 },
  { key:'cx2',   label:'O center X',   min:120, max:220, step:1 },
  { key:'cutDx', label:'Cut offset',   min:5,  max:40,  step:1 },
  { key:'cutR',  label:'Cut radius',   min:40, max:88,  step:1 },
  { key:'oIR',   label:'O inner R',    min:30, max:80,  step:1 },
];

const cEl = document.getElementById('controls');
paramDefs.forEach(d => {
  const lbl = document.createElement('label');
  lbl.innerHTML = `${d.label}
    <input type="range" min="${d.min}" max="${d.max}" step="${d.step}" value="${P[d.key]}" data-key="${d.key}">
    <span class="val">${P[d.key]}</span>`;
  lbl.querySelector('input').addEventListener('input', e => {
    P[d.key] = Number(e.target.value);
    lbl.querySelector('.val').textContent = P[d.key];
    render();
  });
  cEl.appendChild(lbl);
});

render();
</script>

</body>
</html>
